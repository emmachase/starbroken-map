<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>NAVCOM Stripe Falloff Test</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #02040a;
      --ink: #eef7ff;
      --muted: #8da4b8;
      --line: rgba(113, 213, 255, .26);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font: 13px/1.4 Inter, Segoe UI, system-ui, sans-serif;
      color: var(--ink);
      background:
        url("holo-grid.svg") 0 0 / 128px 128px,
        radial-gradient(circle at 50% 46%, rgba(27, 68, 104, .32), transparent 42%),
        var(--bg);
    }
    main {
      width: min(1040px, calc(100vw - 48px));
      display: grid;
      gap: 22px;
    }
    h1 {
      margin: 0;
      font-size: 16px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .row {
      display: grid;
      grid-template-columns: 120px 1fr;
      align-items: center;
      gap: 20px;
    }
    .label {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .rail {
      height: 34px;
      border: 1px solid var(--line);
      background-size: 48px 48px;
      background-position: center;
      background-repeat: repeat;
      box-shadow: 0 0 22px rgba(113, 213, 255, .06);
    }
    .warning { background-image: url("warning-stripe.svg"); }
    .critical { background-image: url("critical-stripe.svg"); }
    .caution { background-image: url("caution-stripe.svg"); }
    .masked {
      mask-image: linear-gradient(90deg, transparent 0%, rgba(0,0,0,.2) 8%, black 18%, black 82%, rgba(0,0,0,.2) 92%, transparent 100%);
      -webkit-mask-image: linear-gradient(90deg, transparent 0%, rgba(0,0,0,.2) 8%, black 18%, black 82%, rgba(0,0,0,.2) 92%, transparent 100%);
      border-color: transparent;
    }
    .pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .caption {
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <h1>Stripe Falloff Test</h1>
    <section class="row">
      <div class="label">warning</div>
      <div class="pair">
        <div><div class="caption">raw tile</div><div class="rail warning"></div></div>
        <div><div class="caption">masked placement</div><div class="rail warning masked"></div></div>
      </div>
    </section>
<section class="row">
      <div class="label">critical</div>
      <div class="pair">
        <div><div class="caption">raw tile</div><div class="rail critical"></div></div>
        <div><div class="caption">masked placement</div><div class="rail critical masked"></div></div>
      </div>
    </section>
<section class="row">
      <div class="label">caution</div>
      <div class="pair">
        <div><div class="caption">raw tile</div><div class="rail caution"></div></div>
        <div><div class="caption">masked placement</div><div class="rail caution masked"></div></div>
      </div>
    </section>
  </main>
</body>
</html>
